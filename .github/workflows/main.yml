name: Postman Collection Workflow

on:
  push:
    branches: [main]
  workflow_dispatch: 
  schedule:
    - cron: 00 12 * * * # 8 am EST
    - cron: 00 11 * * * # 7 pm EST
    - cron: 00 03 * * 1-5 # 11 am EST Monday to friday

jobs:
  run-postman-tests:
    runs-on: ec2-github-runner
      
    steps:
      
      - name: Checkout the code
        uses: actions/checkout@v6.0.2

      - name: Install Nodejs and npm
        uses: actions/setup-node@v6.3.0
        with:
            node-version: '22'

      - name: Install newman and htmlextra globally
        run: |
              npm install -g newman
              npm install -g newman-reporter-htmlextra

      - name: Run Postman Collection with newman
        run: |
              newman run 'inwarranty-flow Collection.postman_collection.json' \
              -e QA.postman_environment.json \
              -d testdata.csv \
              -r cli,htmlextra \
              --reporter-htmlextra-export ./newman/index.html

      - name: Newman Report
        if: always() # ensure that Archive section would be executed irrespective of whether the previous step passed or not
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Newman Report
          path: newman/*.html

      - name: Creating github page branch
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/

      - name: Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v15
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME}}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Phoenix Inwarranty Flow Test Execution Notification
          to: guri76148@gmail.com
          from: ${{ secrets.EMAIL_USERNAME}}
          body: |
                Hi,
                Phoenix Inwarranty flow has been executed. The Report has been published and the URL
                is: https://guri76148.github.io/Phoenix-Inwarranty-Flow/

          

        
        
